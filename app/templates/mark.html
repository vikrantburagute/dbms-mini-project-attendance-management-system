<!DOCTYPE html>
<html>
<head>
    <title>Mark Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark px-4">
        <a class="navbar-brand fw-bold" href="/">Attendance MS</a>
        <div>
            <a href="/" class="btn btn-outline-light btn-sm me-2">Home</a>
            <a href="/student" class="btn btn-outline-light btn-sm me-2">Student Lookup</a>
            <a href="/defaulters" class="btn btn-outline-light btn-sm me-2">Defaulters</a>
            <a href="/mark" class="btn btn-outline-light btn-sm">Mark Attendance</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="mb-4">Mark Attendance</h2>

        {% if success %}
        <div class="alert alert-success">Attendance marked successfully!</div>
        {% endif %}

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST" class="w-50">
            <div class="mb-3">
                <label class="form-label">Student</label>
                <select name="student_id" class="form-select">
                    {% for student in students %}
                    <option value="{{ student.student_id }}">{{ student.roll_no }} - {{ student.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Subject</label>
                <select name="subject_id" class="form-select">
                    {% for subject in subjects %}
                    <option value="{{ subject.subject_id }}">{{ subject.subject_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Teacher</label>
                <select name="teacher_id" class="form-select">
                    {% for teacher in teachers %}
                    <option value="{{ teacher.teacher_id }}">{{ teacher.teacher_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Date</label>
                <input type="date" name="date" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Status</label>
                <select name="status" class="form-select">
                    <option value="Present">Present</option>
                    <option value="Absent">Absent</option>
                </select>
            </div>

            <button type="submit" class="btn btn-dark">Mark Attendance</button>
        </form>
    </div>
</body>
</html>
