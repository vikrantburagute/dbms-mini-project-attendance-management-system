<!DOCTYPE html>
<html>
<head>
    <title>Defaulters List</title>
</head>
<body>
    <h1>Defaulters List (Below 75%)</h1>

    {% if defaulters %}
    <table border="1">
        <tr>
            <th>Roll No</th>
            <th>Name</th>
            <th>Subject</th>
            <th>Attendance %</th>
        </tr>
        {% for record in defaulters %}
        <tr>
            <td>{{ record.roll_no }}</td>
            <td>{{ record.name }}</td>
            <td>{{ record.subject_name }}</td>
            <td>{{ record.attendance_percentage }}%</td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
    <p>No defaulters found.</p>
    {% endif %}

    <a href="/">Back to Home</a>
</body>
</html>
